name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # next.config.mjs가 GITHUB_REPOSITORY로 basePath를 자동 도출하지만,
      # 명시적으로도 노출해 둠 (디버깅 시 echo 가능)
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Verify SQLite database is committed
        run: |
          if [ ! -f prisma/data.db ]; then
            echo "::error::prisma/data.db 가 커밋되어 있지 않습니다. 로컬에서 npm run db:seed 후 git add prisma/data.db && git push 하세요."
            exit 1
          fi
      - run: npm run build:static
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
